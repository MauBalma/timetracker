<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Time Tracker</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f6f7f9;
      --surface: #ffffff;
      --surface-2: #f3f4f6;
      --text: #111827;
      --text-muted: #6b7280;
      --text-subtle: #9ca3af;
      --border: #e5e7eb;
      --border-strong: #d1d5db;
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --primary-text: #ffffff;
      --danger: #dc2626;
      --danger-bg: #fee2e2;
      --warning-bg: #fef3c7;
      --warning-text: #92400e;
      --running-bg: #dcfce7;
      --running-text: #166534;
      --shadow: 0 1px 2px rgba(0, 0, 0, 0.04), 0 1px 3px rgba(0, 0, 0, 0.06);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0c0d10;
        --surface: #17191e;
        --surface-2: #1f222a;
        --text: #f3f4f6;
        --text-muted: #9ca3af;
        --text-subtle: #6b7280;
        --border: #272a32;
        --border-strong: #3a3f4a;
        --primary: #3b82f6;
        --primary-hover: #60a5fa;
        --primary-text: #ffffff;
        --danger: #f87171;
        --danger-bg: #3a1a1a;
        --warning-bg: #3a2e10;
        --warning-text: #fcd34d;
        --running-bg: #15281c;
        --running-text: #86efac;
        --shadow: 0 1px 2px rgba(0, 0, 0, 0.4), 0 1px 3px rgba(0, 0, 0, 0.5);
      }
    }

    * { box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      max-width: 720px;
      margin: 3rem auto;
      padding: 0 1rem 3rem;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }
    h1 {
      margin: 0;
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.01em;
    }
    .user-line {
      margin: 0 0 1.25rem;
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1.25rem;
      margin-bottom: 1rem;
      box-shadow: var(--shadow);
    }

    button {
      padding: 0.55rem 1rem;
      font: inherit;
      font-weight: 500;
      border-radius: 6px;
      border: 1px solid var(--border-strong);
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      transition: background 0.12s, border-color 0.12s, color 0.12s;
    }
    button:hover:not(:disabled) {
      background: var(--surface-2);
      border-color: var(--text-muted);
    }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    button.primary {
      background: var(--primary);
      border-color: var(--primary);
      color: var(--primary-text);
    }
    button.primary:hover:not(:disabled) {
      background: var(--primary-hover);
      border-color: var(--primary-hover);
    }

    button.small {
      padding: 0.3rem 0.65rem;
      font-size: 0.85rem;
    }

    button.danger:hover:not(:disabled) {
      background: var(--danger-bg);
      border-color: var(--danger);
      color: var(--danger);
    }

    .controls-row { display: flex; gap: 0.5rem; }

    #status {
      margin: 1rem 0 0;
      color: var(--text-muted);
      font-variant-numeric: tabular-nums;
      font-size: 0.95rem;
    }

    #warning {
      margin-top: 1rem;
      padding: 0.6rem 0.9rem;
      border-radius: 6px;
      background: var(--warning-bg);
      color: var(--warning-text);
      display: none;
      font-size: 0.9rem;
    }

    #error {
      margin: 0.75rem 0 0;
      color: var(--danger);
      min-height: 1.2em;
      font-size: 0.9rem;
    }

    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 0.5rem;
    }
    .section-header h2 {
      margin: 0;
      font-size: 1rem;
      font-weight: 600;
      color: var(--text);
    }

    table {
      border-collapse: collapse;
      width: 100%;
      font-variant-numeric: tabular-nums;
    }
    th, td {
      text-align: left;
      padding: 0.55rem 0.5rem;
      border-bottom: 1px solid var(--border);
    }
    tbody tr:last-child td { border-bottom: none; }
    th {
      font-weight: 600;
      color: var(--text-subtle);
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    /* Totals — labels muted, values bold, grand total in primary color */
    table.totals { table-layout: fixed; }
    table.totals td:first-child { color: var(--text-muted); }
    table.totals td:last-child,
    table.totals th:last-child {
      text-align: right;
      font-weight: 600;
    }
    table.totals tr:last-child td { font-size: 1.05rem; }
    table.totals tr:last-child td:last-child { color: var(--primary); }

    /* Sessions */
    table.sessions th:last-child { text-align: right; }
    table.sessions td { white-space: nowrap; }
    table.sessions td.actions {
      text-align: right;
      width: 1%; /* shrink-to-fit so dates get the space */
    }
    table.sessions td.actions button + button { margin-left: 0.25rem; }
    .dt-edit { display: inline-flex; align-items: center; gap: 0.3rem; flex-wrap: wrap; }
    .dt-edit .dt-time { display: inline-flex; align-items: center; gap: 0.15rem; }
    .dt-edit input,
    .dt-edit select {
      font: inherit;
      font-size: 0.85rem;
      padding: 0.25rem 0.35rem;
      border: 1px solid var(--border-strong);
      border-radius: 4px;
      background: var(--surface);
      color: var(--text);
    }
    .dt-edit .dt-num { width: 2.75rem; text-align: center; }
    .dt-edit .dt-sep { color: var(--text-muted); }

    /* Week view */
    .week-nav { display: flex; gap: 0.25rem; align-items: center; }
    .week-label {
      color: var(--text-muted);
      font-size: 0.9rem;
      margin: 0 0 0.5rem;
    }
    .week-grid {
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      background: var(--surface);
    }
    .week-headers {
      display: grid;
      grid-template-columns: 48px repeat(7, 1fr);
      background: var(--surface-2);
      border-bottom: 1px solid var(--border);
    }
    .week-headers .gutter { border-right: 1px solid var(--border); }
    .day-header {
      padding: 0.4rem 0.2rem;
      text-align: center;
      border-left: 1px solid var(--border);
      font-size: 0.72rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .day-header:first-child { border-left: none; }
    .day-header .dnum {
      display: block;
      font-size: 1.05rem;
      color: var(--text);
      font-weight: 600;
      margin-top: 0.1rem;
      text-transform: none;
      letter-spacing: 0;
    }
    .day-header.today .dnum { color: var(--primary); }
    .week-body-scroll {
      max-height: 480px;
      overflow-y: auto;
      position: relative;
    }
    .week-body {
      display: grid;
      grid-template-columns: 48px repeat(7, 1fr);
      position: relative;
      height: 960px; /* 24h * 40px */
    }
    .time-axis {
      position: relative;
      border-right: 1px solid var(--border);
    }
    .time-axis .hour-label {
      position: absolute;
      right: 4px;
      font-size: 0.65rem;
      color: var(--text-subtle);
      transform: translateY(-50%);
    }
    .day-column {
      position: relative;
      border-left: 1px solid var(--border);
      background-image: repeating-linear-gradient(
        to bottom,
        transparent,
        transparent 39px,
        var(--border) 39px,
        var(--border) 40px
      );
    }
    .day-column:first-of-type { border-left: none; }
    .day-column.today { background-color: rgba(37, 99, 235, 0.04); }
    .session-block {
      position: absolute;
      left: 2px;
      right: 2px;
      background: color-mix(in srgb, var(--block-color, var(--primary)) 18%, transparent);
      border: 1px solid var(--block-color, var(--primary));
      border-radius: 4px;
      padding: 2px 5px;
      font-size: 0.7rem;
      color: var(--block-color, var(--primary));
      overflow: hidden;
      cursor: pointer;
      box-sizing: border-box;
      line-height: 1.2;
      transition: background 0.12s;
    }
    .session-block:hover {
      background: color-mix(in srgb, var(--block-color, var(--primary)) 32%, transparent);
    }
    .session-block.running {
      background: color-mix(in srgb, var(--block-color, var(--running-text)) 15%, transparent);
      border: 1px dashed var(--block-color, var(--running-text));
      color: var(--block-color, var(--running-text));
    }
    .session-block.running:hover {
      background: color-mix(in srgb, var(--block-color, var(--running-text)) 28%, transparent);
    }
    .session-block.readonly { cursor: default; }

    .team-toggles {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      margin: 0 0 0.6rem;
    }
    .team-toggles[hidden] { display: none; }
    .team-toggle {
      padding: 0.2rem 0.65rem;
      font-size: 0.8rem;
      font-weight: 500;
      border-radius: 999px;
      border: 1px solid var(--border-strong);
      background: var(--surface);
      color: var(--text-muted);
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      cursor: pointer;
      transition: background 0.12s, border-color 0.12s, color 0.12s;
    }
    .team-toggle .dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--user-color, var(--text-subtle));
    }
    .team-toggle.on {
      background: color-mix(in srgb, var(--user-color, var(--primary)) 14%, var(--surface));
      border-color: var(--user-color, var(--primary));
      color: var(--text);
    }
    .team-toggle:hover:not(.on) {
      background: var(--surface-2);
      border-color: var(--text-muted);
    }

    /* Team stats / pie */
    .team-controls {
      display: flex;
      gap: 0.5rem;
      align-items: center;
      flex-wrap: wrap;
      justify-content: flex-end;
    }
    .toggle-pill {
      padding: 0.25rem 0.65rem;
      font-size: 0.8rem;
    }
    .toggle-pill.on {
      background: var(--surface-2);
      border-color: var(--text-muted);
      color: var(--text);
      box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.08);
    }
    .toggle-pill.on::before {
      content: '✓ ';
      color: var(--text-muted);
    }
    .period-tabs { display: flex; gap: 0.25rem; }
    .period-tabs button {
      padding: 0.25rem 0.6rem;
      font-size: 0.8rem;
    }
    .period-tabs button.on {
      background: var(--primary);
      border-color: var(--primary);
      color: var(--primary-text);
    }
    .pie-wrap {
      display: flex;
      gap: 1.5rem;
      align-items: center;
      flex-wrap: wrap;
    }
    .pie-wrap svg { flex: 0 0 auto; display: block; }
    .team-pie-slice { stroke: var(--surface); stroke-width: 0.5; }
    .team-pie-empty { fill: none; stroke: var(--border); stroke-width: 2; }
    .pie-total {
      fill: var(--text);
      font-size: 11px;
      font-weight: 600;
      text-anchor: middle;
      font-family: inherit;
    }
    .pie-total-sub {
      fill: var(--text-subtle);
      font-size: 5px;
      text-anchor: middle;
      font-family: inherit;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    .team-legend {
      list-style: none;
      margin: 0;
      padding: 0;
      flex: 1;
      min-width: 200px;
      font-size: 0.9rem;
    }
    .team-legend li {
      display: grid;
      grid-template-columns: 14px 1fr auto 3.5em;
      gap: 0.6rem;
      align-items: center;
      padding: 0.35rem 0;
      border-bottom: 1px solid var(--border);
    }
    .team-legend li:last-child { border-bottom: none; }
    .team-legend .swatch { width: 12px; height: 12px; border-radius: 3px; }
    .team-legend .hours {
      color: var(--text-muted);
      font-variant-numeric: tabular-nums;
    }
    .team-legend .pct {
      color: var(--text-subtle);
      font-variant-numeric: tabular-nums;
      text-align: right;
    }
    .team-legend .empty {
      grid-column: 1 / -1;
      color: var(--text-muted);
      text-align: center;
      padding: 1rem 0;
    }
    .session-block .block-time { font-weight: 600; }
    .session-block .block-dur { opacity: 0.8; }
    .now-line {
      position: absolute;
      height: 0;
      border-top: 2px solid var(--danger);
      z-index: 2;
      pointer-events: none;
    }
    .now-line::before {
      content: '';
      position: absolute;
      left: -4px;
      top: -5px;
      width: 8px;
      height: 8px;
      background: var(--danger);
      border-radius: 50%;
    }
    tr.flash td { animation: flash-row 1.2s ease-out; }
    @keyframes flash-row {
      0%   { background: rgba(37, 99, 235, 0.25); }
      100% { background: transparent; }
    }

    /* Upcoming dates / countdown */
    .dates-list { list-style: none; margin: 0; padding: 0; }
    .date-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.75rem;
      padding: 0.6rem 0;
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
    }
    .date-item:last-child { border-bottom: none; }
    .date-main { display: flex; flex-direction: column; min-width: 0; }
    .date-label { font-weight: 600; }
    .date-when { color: var(--text-muted); font-size: 0.85rem; }
    .date-right { display: flex; align-items: center; gap: 0.5rem; margin-left: auto; }
    .countdown {
      font-variant-numeric: tabular-nums;
      font-weight: 600;
      font-size: 0.9rem;
      padding: 0.15rem 0.65rem;
      border-radius: 999px;
      background: var(--surface-2);
      color: var(--text);
      white-space: nowrap;
    }
    .countdown.future {
      background: color-mix(in srgb, var(--danger) 12%, var(--surface));
      color: var(--danger);
      font-weight: 500;
    }
    .countdown.soon {
      background: var(--warning-bg);
      color: var(--warning-text);
    }
    .countdown.today {
      background: var(--running-bg);
      color: var(--running-text);
    }
    .countdown.past { background: var(--surface-2); color: var(--text-subtle); }
    .date-empty { color: var(--text-muted); text-align: center; padding: 1rem 0; }
    .date-edit { display: flex; gap: 0.4rem; flex-wrap: wrap; flex: 1; }
    .date-edit input {
      font: inherit;
      font-size: 0.9rem;
      padding: 0.3rem 0.45rem;
      border: 1px solid var(--border-strong);
      border-radius: 4px;
      background: var(--surface);
      color: var(--text);
    }
    .date-edit .date-label-input { flex: 1; min-width: 160px; }
    .date-actions button + button { margin-left: 0.25rem; }

    .running-tag {
      display: inline-block;
      margin-left: 0.5rem;
      padding: 0.05rem 0.5rem;
      font-size: 0.65rem;
      font-weight: 600;
      background: var(--running-bg);
      color: var(--running-text);
      border-radius: 999px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      vertical-align: middle;
    }
  </style>
</head>
<body>
  <section id="signed-out" hidden>
    <header><h1>Time Tracker</h1></header>
    <div class="card">
      <p>Sign in to start tracking.</p>
      <button id="sign-in" class="primary">Sign in with Google</button>
    </div>
  </section>

  <section id="signed-in" hidden>
    <header>
      <h1>Time Tracker</h1>
      <button id="sign-out" class="small">Sign out</button>
    </header>
    <p class="user-line">Signed in as <strong id="user-label"></strong></p>

    <div class="card" id="dates-card">
      <div class="section-header">
        <h2>Upcoming dates</h2>
        <button id="add-date" class="small" hidden>Add date</button>
      </div>
      <ul class="dates-list" id="dates-list"></ul>
    </div>

    <div class="card">
      <div class="controls-row">
        <button id="start" class="primary">Start</button>
        <button id="stop">Stop</button>
      </div>
      <p id="status"></p>
      <div id="warning"></div>
      <p id="error"></p>
    </div>

    <div class="card">
      <div class="section-header">
        <h2>Totals</h2>
      </div>
      <table class="totals">
        <tbody>
          <tr><td>Today</td>      <td id="total-today">—</td></tr>
          <tr><td>This week</td>  <td id="total-week">—</td></tr>
          <tr><td>This month</td> <td id="total-month">—</td></tr>
          <tr><td>Total</td>      <td id="total-all">—</td></tr>
        </tbody>
      </table>
    </div>

    <div class="card">
      <div class="section-header">
        <h2>Week</h2>
        <div class="week-nav">
          <button id="week-prev"  class="small" title="Previous week">◀</button>
          <button id="week-today" class="small">Today</button>
          <button id="week-next"  class="small" title="Next week">▶</button>
        </div>
      </div>
      <p id="week-label" class="week-label"></p>
      <div class="team-toggles" id="team-toggles" hidden></div>
      <div class="week-grid">
        <div class="week-headers" id="week-headers"></div>
        <div class="week-body-scroll" id="week-scroll">
          <div class="week-body" id="week-body"></div>
        </div>
      </div>
    </div>

    <div class="card" id="team-stats-card" hidden>
      <div class="section-header">
        <h2>Team hours</h2>
        <div class="team-controls">
          <button id="exclude-me-toggle" class="small toggle-pill" title="Exclude my sessions from the chart">Exclude me</button>
          <div class="period-tabs" id="period-tabs">
            <button data-period="today">Today</button>
            <button data-period="week" class="on">Week</button>
            <button data-period="month">Month</button>
            <button data-period="all">All</button>
          </div>
        </div>
      </div>
      <div class="pie-wrap">
        <svg id="team-pie" viewBox="0 0 100 100" width="180" height="180" aria-label="Team hours pie chart"></svg>
        <ul class="team-legend" id="team-legend"></ul>
      </div>
    </div>

    <div class="card">
      <div class="section-header">
        <h2>Sessions</h2>
        <button id="add-session" class="small">Add session</button>
      </div>
      <table class="sessions">
        <thead>
          <tr>
            <th>Start</th>
            <th>End</th>
            <th>Duration</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="sessions-body"></tbody>
      </table>
    </div>
  </section>

  <script type="module" src="./app.js"></script>
</body>
</html>
